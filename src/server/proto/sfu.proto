syntax = "proto3";

package sfu;
option go_package = "./sfu";

service SfuService {
  rpc SfuSession(stream SfuMessage) returns (stream SfuMessage);
}

enum MessageType {
  UNKNOWN = 0;
  // client request 
  REGISTER = 1;       
  KEEPALIVE = 2;     
  FLOW_REPORT = 3; 
  AUDIO_LEVEL_REPORT = 4;

  // server request 
  CREATE_ROUTER = 101; 
  PRODUCE_UPDATE = 102;
  CONSUME_UPDATE = 103;
}

message SfuMessage {
  MessageType type = 1;
  int64 timestamp = 2;
  
  // message content 
  oneof content {
    RegisterRequest register_request = 10;
    KeepaliveRequest keepalive_request = 11;
    AudioLevelRequest audio_level_request = 12;
    FlowReportRequest flow_report_request = 13;
    CreateRouterRequest create_route_request = 14;
    ProduceStateRequest produce_state_request = 15;
    ConsumeStateRequest consume_state_request = 16;
    string text_message = 17;
  }
}

message RegisterRequest {
  string server_id = 1;
}

message KeepaliveRequest {
  string server_id = 1;
}

message FlowReportRequest {
  string server_id = 1;
}

message AudioLevelRequest {
  string server_id = 1;
}

message CreateRouterRequest {
  string server_id = 1;
}

message ProduceStateRequest {
  string server_id = 1;
}

message ConsumeStateRequest {
  string server_id = 1;
}

enum ProduceState {
  CREATE = 0;
  PAUSE = 1;
  RESUME = 2;
  CLOSE = 3;
}